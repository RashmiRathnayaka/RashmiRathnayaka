<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 280" width="100%" height="100%">
  <rect width="380" height="280" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- Animated Yellow Flow Connections -->
  <g fill="none" stroke="#f9e2af" stroke-width="1.5" opacity="0.8">
    <path d="M 40 80 H 120 V 160 H 180" stroke-dasharray="6,3">
      <animate attributeName="stroke-dashoffset" values="100;0" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M 120 80 H 260 V 140 H 210" />
    <path d="M 340 80 H 260 V 140 H 210" stroke-dasharray="6,3">
      <animate attributeName="stroke-dashoffset" values="0;100" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M 180 220 H 120 V 160" />
    <path d="M 220 220 H 340 V 180 H 310" />
    <path d="M 210 180 V 220" />
  </g>

  <!-- Network Dot Hubs -->
  <g fill="#f9e2af">
    <circle cx="120" cy="80" r="4" />
    <circle cx="260" cy="80" r="4" />
    <circle cx="120" cy="160" r="4" />
    <circle cx="260" cy="140" r="4" />
    <circle cx="120" cy="220" r="4" />
    <circle cx="220" cy="220" r="4" />
    <circle cx="340" cy="180" r="4" />
  </g>

  <!-- Node 1: Camera sensor -->
  <g transform="translate(25, 60)" fill="#11111b" stroke="#f9e2af" stroke-width="1.5">
    <rect width="40" height="40" rx="4" />
    <circle cx="20" cy="20" r="12" />
    <circle cx="20" cy="20" r="4" fill="#f9e2af" />
  </g>

  <!-- Node 2: Server bridge with Blinking Diode -->
  <g transform="translate(150, 25)" fill="#11111b" stroke="#f9e2af" stroke-width="1.5">
    <rect width="80" height="40" rx="4" />
    <line x1="10" y1="15" x2="70" y2="15" stroke-dasharray="2,2" />
    <circle cx="20" cy="30" r="3" fill="#a6e3a1">
      <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="30" r="3" fill="#a6e3a1" />
    <circle cx="40" cy="30" r="3" fill="#f9e2af" />
  </g>

  <!-- Node 3: Audio/Speaker -->
  <g transform="translate(315, 60)" fill="#11111b" stroke="#f9e2af" stroke-width="1.5">
    <rect width="35" height="50" rx="3" />
    <line x1="7" y1="10" x2="28" y2="10" stroke-dasharray="2,1"/>
    <line x1="7" y1="15" x2="28" y2="15" stroke-dasharray="2,1"/>
    <circle cx="17.5" cy="35" r="8" />
  </g>

  <!-- Central Hub: Master Terminal Console -->
  <g transform="translate(140, 110)" fill="#11111b" stroke="#f9e2af" stroke-width="1.5">
    <rect width="100" height="70" rx="5" />
    <rect x="5" y="5" width="90" height="50" rx="2" fill="#0d1117" />
    <rect x="40" y="70" width="20" height="15" />
    <path d="M 30 85 L 70 85" />
    
    <!-- Code on Main Console Screen -->
    <line x1="12" y1="15" x2="40" y2="15" stroke="#89b4fa" stroke-width="2" />
    <line x1="12" y1="22" x2="65" y2="22" stroke="#a6e3a1" stroke-width="2" />
    <line x1="12" y1="29" x2="35" y2="29" stroke="#f9e2af" stroke-width="2" />
    
    <text x="65" y="45" font-family="monospace" font-size="12" fill="#a6e3a1" stroke="none">JS</text>
  </g>

  <!-- Node 4: Hard Drive / Booklet -->
  <g transform="translate(25, 175)" fill="#11111b" stroke="#f9e2af" stroke-width="1.5">
    <rect width="45" height="60" rx="4" />
    <line x1="10" y1="15" x2="35" y2="15" />
    <line x1="10" y1="25" x2="35" y2="25" />
    <line x1="10" y1="35" x2="35" y2="35" />
  </g>

  <!-- Node 5: Processor Base with Spinning Turbine -->
  <g transform="translate(130, 215)" fill="#11111b" stroke="#f9e2af" stroke-width="1.5">
    <rect width="70" height="40" rx="4" />
    <circle cx="20" cy="20" r="12" />
    <g transform="translate(20,20)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite" />
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#f9e2af" stroke-width="2" />
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#f9e2af" stroke-width="2" />
    </g>
    <rect x="42" y="10" width="20" height="5" />
    <rect x="42" y="20" width="20" height="5" />
  </g>

  <!-- Node 6: Handheld Terminal / Tablet -->
  <g transform="translate(290, 200)" fill="#11111b" stroke="#f9e2af" stroke-width="1.5">
    <rect width="35" height="55" rx="4" />
    <rect x="4" y="6" width="27" height="38" fill="#0d1117" />
    <circle cx="17.5" cy="49" r="2.5" />
    
    <rect x="8" y="12" width="18" height="6" fill="#f38ba8" stroke="none" />
    <rect x="8" y="22" width="18" height="6" fill="#a6e3a1" stroke="none" />
  </g>
</svg>
